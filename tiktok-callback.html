<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PolySignal — OAuth callback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #0B0B0F;
      color: #ECECEC;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 40px 24px;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      max-width: 720px;
      width: 100%;
      background: #182533;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    }
    h1 {
      margin: 0 0 8px;
      font-weight: 900;
      letter-spacing: -0.5px;
      font-size: 32px;
    }
    p {
      margin: 6px 0;
      color: #8A8A93;
      line-height: 1.5;
    }
    label {
      display: block;
      margin-top: 24px;
      font-size: 12px;
      letter-spacing: 0.6px;
      color: #8A8A93;
      text-transform: uppercase;
      font-weight: 700;
    }
    textarea, input[type=text] {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 12px 14px;
      background: #0B0B0F;
      color: #00FF88;
      border: 1px solid #2a3340;
      border-radius: 10px;
      font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-all;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    button {
      margin-top: 14px;
      padding: 10px 18px;
      background: #00FF88;
      color: #0B0B0F;
      font-weight: 700;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    button:active {
      opacity: 0.8;
    }
    .ok    { color: #00FF88; }
    .err   { color: #FF5C7A; }
    code   { color: #00FF88; }
  </style>
</head>
<body>
  <div class="card">
    <h1>PolySignal · OAuth callback</h1>
    <p>TikTok redirected here after authorization. Copy the values below into your local exchange script to mint access + refresh tokens.</p>
    <p id="status"></p>

    <label for="codeBox">Authorization code</label>
    <textarea id="codeBox" readonly></textarea>
    <button onclick="copy('codeBox', this)">Copy code</button>

    <label for="stateBox">State (must match the one your script sent)</label>
    <input id="stateBox" type="text" readonly>

    <label for="scopesBox">Scopes granted</label>
    <input id="scopesBox" type="text" readonly>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get("code");
      const state  = params.get("state") || "";
      const scopes = params.get("scopes") || params.get("scope") || "";
      const error  = params.get("error");

      const status = document.getElementById("status");
      if (error) {
        status.className = "err";
        status.textContent = "Error from TikTok: " + error + " — " + (params.get("error_description") || "no description");
      } else if (!code) {
        status.className = "err";
        status.textContent = "No authorization code in URL — open this page only via TikTok's redirect.";
      } else {
        status.className = "ok";
        status.textContent = "Authorization succeeded. Copy the code below within the next few minutes — it expires fast.";
      }

      document.getElementById("codeBox").value   = code   || "";
      document.getElementById("stateBox").value  = state;
      document.getElementById("scopesBox").value = scopes;
    })();

    function copy(id, btn) {
      const el = document.getElementById(id);
      el.select();
      document.execCommand("copy");
      const old = btn.textContent;
      btn.textContent = "Copied ✓";
      setTimeout(() => (btn.textContent = old), 1200);
    }
  </script>
</body>
</html>
